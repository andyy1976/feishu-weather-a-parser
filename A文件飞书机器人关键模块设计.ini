  /**
   * 发送文件消息
   */
  public async sendFileMessage(chatId: string, filePath: string, fileName: string): Promise<void> {
    const token = await this.getTenantAccessToken();
    // 先上传文件到飞书
    const fileKey = await this.uploadFileToFeishu(filePath, fileName);
    // 发送文件消息
    const postData = JSON.stringify({
      receive_id: chatId,
      content: JSON.stringify({ file_key: fileKey }),
      msg_type: "file",
    });

    return new Promise((resolve, reject) => {
      const options = {
        hostname: "open.feishu.cn",
        port: 443,
        path: "/open-apis/im/v1/messages?receive_id_type=chat_id",
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          "Content-Length": Buffer.byteLength(postData),
        },
      };

      const req = https.request(options, (res) => {
        let data = "";
        res.on("data", (chunk) => {
          data += chunk;
        });
        res.on("end", () => {
          const result = JSON.parse(data);
          if (result.code !== 0) {
            reject(new Error(`发送文件失败：${result.msg}`));
            return;
          }
          resolve();
        });
      });

      req.on("error", (err) => {
        reject(err);
      });

      req.write(postData);
      req.end();
    });
  }

  /**
   * 上传文件到飞书
   */
  private async uploadFileToFeishu(filePath: string, fileName: string): Promise<string> {
    const token = await this.getTenantAccessToken();
    const fileStat = await fs.stat(filePath);
    const fileBuffer = await fs.readFile(filePath);

    const boundary = "----WebKitFormBoundary" + Date.now();
    let postData = `--${boundary}\r\n`;
    postData += `Content-Disposition: form-data; name="file_type"\r\n\r\nstream\r\n`;
    postData += `--${boundary}\r\n`;
    postData += `Content-Disposition: form-data; name="file_name"\r\n\r\n${fileName}\r\n`;
    postData += `--${boundary}\r\n`;
    postData += `Content-Disposition: form-data; name="file"; filename="${fileName}"\r\n`;
    postData += `Content-Type: application/octet-stream\r\n\r\n`;

    const endData = `\r\n--${boundary}--\r\n`;
    const fullBuffer = Buffer.concat([
      Buffer.from(postData, "utf-8"),
      fileBuffer,
      Buffer.from(endData, "utf-8"),
    ]);

    return new Promise((resolve, reject) => {
      const options = {
        hostname: "open.feishu.cn",
        port: 443,
        path: "/open-apis/drive/v1/files/upload_all",
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": `multipart/form-data; boundary=${boundary}`,
          "Content-Length": fullBuffer.length,
        },
      };

      const req = https.request(options, (res) => {
        let data = "";
        res.on("data", (chunk) => {
          data += chunk;
        });
        res.on("end", () => {
          const result = JSON.parse(data);
          if (result.code !== 0) {
            reject(new Error(`上传文件到飞书失败：${result.msg}`));
            return;
          }
          resolve(result.data.file_key);
        });
      });

      req.on("error", (err) => {
        reject(err);
      });

      req.write(fullBuffer);
      req.end();
    });
  }

  /**
   * 获取用户部门信息
   */
  public async getUserDepartmentFullPath(userId: string): Promise<string> {
    const token = await this.getTenantAccessToken();
    return new Promise((resolve, reject) => {
      const options = {
        hostname: "open.feishu.cn",
        port: 443,
        path: `/open-apis/contact/v3/users/${userId}?user_id_type=user_id&department_id_type=open_department_id`,
        method: "GET",
        headers: {
          Authorization: `Bearer ${token}`,
        },
      };

      const req = https.request(options, (res) => {
        let data = "";
        res.on("data", (chunk) => {
          data += chunk;
        });
        res.on("end", () => {
          const result = JSON.parse(data);
          if (result.code !== 0) {
            reject(new Error(`获取用户部门信息失败：${result.msg}`));
            return;
          }
          // 简化处理，返回部门名称拼接路径，实际可递归获取完整路径
          const departmentNames = result.data.user.department_names || [];
          resolve(departmentNames.join("/"));
        });
      });

      req.on("error", (err) => {
        reject(err);
      });

      req.end();
    });
  }
}
四、模块三：多存储适配核心模块
对应原方案「存储类技能」，补全MySQL、百度网盘、ARAS 服务器存储能力，与解析器输出、区域管理模块联动，实现多端存储与区域化归档。
创建 src/storage-manager.ts：
typescript
运行
import { StorageConfig, StorageType, RegionInfo } from "./types";
import { RegionManager } from "./region-manager";
import * as fs from "fs/promises";
import * as path from "path";
import { existsSync } from "fs";
import mysql from "mysql2/promise";
import { Client } from "@baiducloud/sdk";
import { NodeSSH } from "node-ssh";

/**
 * 多存储管理核心类
 * 支持SQLite/MySQL/百度网盘/ARAS服务器四种存储方式，按区域自动归档
 */
export class StorageManager {
  private readonly configs: StorageConfig[];
  private readonly regionManager: RegionManager;
  private mysqlPool?: mysql.Pool;
  private baiduPanClient?: Client;

  constructor(configs: StorageConfig[], regionManager: RegionManager) {
    this.configs = configs;
    this.regionManager = regionManager;
    this.initStorageClients();
  }

  /**
   * 初始化各存储客户端
   */
  private async initStorageClients() {
    for (const config of this.configs) {
      if (!config.enable) continue;

      switch (config.type) {
        case "mysql":
          // 初始化MySQL连接池
          this.mysqlPool = mysql.createPool({
            host: config.config.host,
            port: config.config.port || 3306,
            user: config.config.user,
            password: config.config.password,
            database: config.config.database,
            charset: "utf8mb4",
            connectionLimit: 10,
          });
          console.log("MySQL存储客户端初始化完成");
          break;

        case "baidu_pan":
          // 初始化百度网盘客户端
          this.baiduPanClient = new Client({
            ak: config.config.ak,
            sk: config.config.sk,
            endpoint: config.config.endpoint || "https://pan.baidu.com/rest/2.0",
          });
          console.log("百度网盘存储客户端初始化完成");
          break;

        case "aras":
          // ARAS通过SSH远程上传，无需初始化客户端，执行时创建连接
          console.log("ARAS存储配置加载完成");
          break;
      }
    }
  }

  // ==================== 统一存储入口 ====================
  /**
   * 存储文件/数据（自动按启用的存储类型分发）
   * @param regionId 区域ID
   * @param monthYear 数据年月
   * @param stationNum 站点编号
   * @param fileData 要存储的文件/数据
   */
  public async save(
    regionId: string,
    monthYear: string,
    stationNum: string,
    fileData: {
      excelPath?: string;
      rawData?: Record<string, any[]>;
      fileName: string;
    }
  ): Promise<Record<StorageType, string>> {
    const result: Record<StorageType, string> = {} as any;
    const regionFullPath = this.regionManager.getRegionFullPath(regionId);
    const year = monthYear.substring(0, 4);
    const month = monthYear.substring(4, 2);
    // 归档路径：区域/年份/月份/站点编号
    const archivePath = `${regionFullPath}/${year}/${month}/${stationNum}`;

    for (const config of this.configs) {
      if (!config.enable) continue;

      try {
        switch (config.type) {
          case "mysql":
            if (fileData.rawData) {
              result.mysql = await this.saveToMysql(archivePath, regionId, monthYear, stationNum, fileData.rawData);
            }
            break;

          case "baidu_pan":
            if (fileData.excelPath) {
              result.baidu_pan = await this.saveToBaiduPan(archivePath, fileData.excelPath, fileData.fileName);
            }
            break;

          case "aras":
            if (fileData.excelPath) {
              result.aras = await this.uploadToAras(config.config, archivePath, fileData.excelPath, fileData.fileName);
            }
            break;
        }
      } catch (err) {
        console.error(`存储到${config.type}失败：`, err);
        result[config.type] = `存储失败：${(err as Error).message}`;
      }
    }

    return result;
  }

  // ==================== 各存储实现 ====================
  /**
   * 存储到MySQL（按区域分表，行级权限隔离）
   */
  private async saveToMysql(
    archivePath: string,
    regionId: string,
    monthYear: string,
    stationNum: string,
    rawData: Record<string, any[]>
  ): Promise<string> {
    if (!this.mysqlPool) throw new Error("MySQL客户端未初始化");
    const connection = await this.mysqlPool.getConnection();

    try {
      await connection.beginTransaction();
      // 写入文件头记录
      const [headerResult] = await connection.execute(
        `INSERT INTO weather_file_header 
        (region_id, archive_path, station_num, month_year, created_at)
        VALUES (?, ?, ?, ?, NOW())`,
        [regionId, archivePath, stationNum, monthYear]
      );
      const fileId = (headerResult as any).insertId;

      // 批量写入各表数据，自动添加region_id隔离字段
      for (const [tableName, rows] of Object.entries(rawData)) {
        if (rows.length === 0) continue;

        // 自动建表（若不存在）
        const createTableSql = this.generateCreateTableSql(tableName, rows[0]);
        await connection.execute(createTableSql);

        // 批量插入数据，添加region_id和file_id
        const columns = [...Object.keys(rows[0]), "region_id", "file_id"];
        const placeholders = rows.map(() => `(${columns.map(() => "?").join(",")})`).join(",");
        const values: any[] = [];

        for (const row of rows) {
          values.push(...Object.values(row), regionId, fileId);
        }

        await connection.execute(
          `INSERT INTO ${tableName} (${columns.join(",")}) VALUES ${placeholders}`,
          values
        );
      }

      await connection.commit();
      return `存储成功，文件ID：${fileId}`;
    } catch (err) {
      await connection.rollback();
      throw err;
    } finally {
      connection.release();
    }
  }

  /**
   * 上传到百度网盘
   */
  private async saveToBaiduPan(archivePath: string, localFilePath: string, fileName: string): Promise<string> {
    if (!this.baiduPanClient) throw new Error("百度网盘客户端未初始化");
    const remotePath = `/apps/天气A文件机器人/${archivePath}/${fileName}`;

    // 读取文件
    const fileBuffer = await fs.readFile(localFilePath);
    // 上传文件
    await this.baiduPanClient.upload(remotePath, fileBuffer);
    // 获取分享链接
    const shareResult = await this.baiduPanClient.request("POST", "/pan/rest/2.0/xpan/file?method=share", {
      form: {
        fid_list: `[${(await this.baiduPanClient.stat(remotePath)).data.fs_id}]`,
        channel: "share",
        period: 0,
      },
    });

    return shareResult.data.link || remotePath;
  }

  /**
   * 上传到ARAS服务器（SSH/SFTP）
   */
  private async uploadToAras(
    config: Record<string, any>,
    archivePath: string,
    localFilePath: string,
    fileName: string
  ): Promise<string> {
    const ssh = new NodeSSH();
    try {
      // 连接ARAS服务器
      await ssh.connect({
        host: config.host,
        port: config.port || 22,
        username: config.username,
        privateKey: config.private_key_path ? await fs.readFile(config.private_key_path, "utf-8") : undefined,
        password: config.password,
      });

      // 远程归档路径
      const remoteDir = `${config.remote_root_path}/${archivePath.replace(/\//g, "_")}`;
      // 创建远程目录
      await ssh.execCommand(`mkdir -p ${remoteDir}`);
      // 上传文件
      const remotePath = `${remoteDir}/${fileName}`;
      await ssh.putFile(localFilePath, remotePath);

      return remotePath;
    } finally {
      ssh.dispose();
    }
  }

  /**
   * 自动生成建表SQL
   */
  private generateCreateTableSql(tableName: string, row: Record<string, any>): string {
    const columns = Object.entries(row)
      .map(([key, value]) => {
        const type = typeof value === "number" ? "DOUBLE" : "TEXT";
        return `${key} ${type}`;
      })
      .join(", ");

    return `
      CREATE TABLE IF NOT EXISTS ${tableName} (
        id INT AUTO_INCREMENT PRIMARY KEY,
        ${columns},
        region_id TEXT NOT NULL,
        file_id INT NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        INDEX idx_region (region_id),
        INDEX idx_file (file_id)
      ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
    `;
  }

  /**
   * 关闭所有连接
   */
  public async close() {
    if (this.mysqlPool) {
      await this.mysqlPool.end();
    }
  }
}
五、模块四：统计分析核心模块
对应原方案「统计分析类技能」，实现月度统计、风表专项分析、自定义统计脚本，基于解析后的数据生成统计结果与可视化图表，为飞书文档报告提供数据支撑。
创建 src/statistics-analyzer.ts：
typescript
运行
import { StatisticsResult, StatisticsType } from "./types";
import { createCanvas } from "canvas";
import * as echarts from "echarts";

/**
 * 气象数据统计分析核心类
 * 实现月度统计、风表分析、自定义脚本执行
 */
export class StatisticsAnalyzer {
  /**
   * 统一分析入口
   */
  public async analyze(
    type: StatisticsType,
    stationNum: string,
    monthYear: string,
    rawData: Record<string, any[]>,
    customScript?: string
  ): Promise<StatisticsResult> {
    switch (type) {
      case "monthly":
        return this.monthlyStatistics(stationNum, monthYear, rawData);
      case "wind":
        return this.windDataAnalysis(stationNum, monthYear, rawData);
      case "custom":
        if (!customScript) throw new Error("自定义统计必须提供脚本内容");
        return this.customStatistics(stationNum, monthYear, rawData, customScript);
    }
  }

  /**
   * 月度常规统计
   */
  private async monthlyStatistics(
    stationNum: string,
    monthYear: string,
    rawData: Record<string, any[]>
  ): Promise<StatisticsResult> {
    const result: Record<string, any> = {};
    const year = monthYear.substring(0, 4);
    const month = monthYear.substring(4, 2);

    // 气温统计
    if (rawData.tbdatatable) {
      const tempData = rawData.tbdatatable;
      const allTemp = tempData.map((row) => parseFloat(row.col5 || 0)).filter((v) => !isNaN(v));
      result.temperature = {
        avg: (allTemp.reduce((a, b) => a + b, 0) / allTemp.length).toFixed(1),
        max: Math.max(...allTemp).toFixed(1),
        min: Math.min(...allTemp).toFixed(1),
        days: tempData.length,
      };
    }

    // 气压统计
    if (rawData.pcdatatable) {
      const pressureData = rawData.pcdatatable;
      const allPressure = pressureData.map((row) => parseFloat(row.col5 || 0)).filter((v) => !isNaN(v));
      result.pressure = {
        avg: (allPressure.reduce((a, b) => a + b, 0) / allPressure.length).toFixed(1),
        max: Math.max(...allPressure).toFixed(1),
        min: Math.min(...allPressure).toFixed(1),
      };
    }

    // 湿度统计
    if (rawData.ubdatatable) {
      const humidityData = rawData.ubdatatable;
      const allHumidity = humidityData.map((row) => parseFloat(row.col5 || 0)).filter((v) => !isNaN(v));
      result.humidity = {
        avg: (allHumidity.reduce((a, b) => a + b, 0) / allHumidity.length).toFixed(0),
        max: Math.max(...allHumidity).toFixed(0),
        min: Math.min(...allHumidity).toFixed(0),
      };
    }

    // 降水量统计
    if (rawData.r61datatable) {
      const rainData = rawData.r61datatable;
      const allRain = rainData.map((row) => parseFloat(row.htotal || 0)).filter((v) => !isNaN(v));
      result.precipitation = {
        total: allRain.reduce((a, b) => a + b, 0).toFixed(1),
        maxDaily: Math.max(...allRain).toFixed(1),
        rainDays: allRain.filter((v) => v >= 0.1).length,
        rainstormDays: allRain.filter((v) => v >= 50).length,
      };
    }

    // 生成月度趋势图
    const trendChart = await this.generateMonthlyTrendChart(year, month, rawData);

    // 生成HTML表格
    const tableHtml = this.generateStatisticsTable(result);

    return {
      type: "monthly",
      station_num: stationNum,
      month_year: monthYear,
      data: result,
      charts: [trendChart],
      table_html: tableHtml,
    };
  }

  /**
   * 风表专项分析（风向玫瑰图）
   */
  private async windDataAnalysis(
    stationNum: string,
    monthYear: string,
    rawData: Record<string, any[]>
  ): Promise<StatisticsResult> {
    const result: Record<string, any> = {
      windDirectionCount: {}, // 各风向出现次数
      windSpeedAvg: {}, // 各风向平均风速
      maxWindSpeed: 0, // 月最大风速
      maxWindDirection: "", // 最大风速风向
      windyDays: 0, // 大风日数
    };

    // 2分钟平均风数据
    if (rawData.fn1datatable && rawData.fn1ddatatable) {
      const windSpeedData = rawData.fn1datatable;
      const windDirectionData = rawData.fn1ddatatable;

      // 统计风向分布
      const directionMap: Record<string, { count: number; speedSum: number }> = {};
      windDirectionData.forEach((row, index) => {
        const direction = row.col0 || "静风";
        const speed = parseFloat(windSpeedData[index]?.col5 || 0);

        if (!directionMap[direction]) {
          directionMap[direction] = { count: 0, speedSum: 0 };
        }
        directionMap[direction].count += 1;
        directionMap[direction].speedSum += speed;
      });

      // 计算结果
      for (const [direction, data] of Object.entries(directionMap)) {
        result.windDirectionCount[direction] = data.count;
        result.windSpeedAvg[direction] = (data.speedSum / data.count).toFixed(1);
      }
    }

    // 极大风统计
    if (rawData.fn3datatable) {
      const maxWindData = rawData.fn3datatable;
      const allMaxSpeed = maxWindData.map((row) => parseFloat(row.dmaxs1 || 0)).filter((v) => !isNaN(v));
      result.maxWindSpeed = Math.max(...allMaxSpeed).toFixed(1);
      result.windyDays = allMaxSpeed.filter((v) => v >= 10.8).length; // 大风标准：>=10.8m/s
    }

    // 生成风向玫瑰图
    const roseChart = await this.generateWindRoseChart(result);

    // 生成HTML表格
    const tableHtml = this.generateWindTable(result);

    return {
      type: "wind",
      station_num: stationNum,
      month_year: monthYear,
      data: result,
      charts: [roseChart],
      table_html: tableHtml,
    };
  }

  /**
   * 自定义统计脚本执行（沙箱隔离）
   */
  private async customStatistics(
    stationNum: string,
    monthYear: string,
    rawData: Record<string, any[]>,
    script: string
  ): Promise<StatisticsResult> {
    // 沙箱环境：仅暴露rawData和基础工具方法，禁止访问系统资源
    const vm = require("vm");
    const sandbox = {
      rawData,
      stationNum,
      monthYear,
      console: console,
      Math: Math,
      Array: Array,
      Object: Object,
    };

    vm.createContext(sandbox);
    const result = vm.runInNewContext(script, sandbox, { timeout: 5000 }); // 超时5秒，防止死循环

    return {
      type: "custom",
      station_num: stationNum,
      month_year: monthYear,
      data: result.data || result,
      table_html: result.table_html || "<pre>" + JSON.stringify(result, null, 2) + "</pre>",
    };
  }

  // ==================== 图表生成工具方法 ====================
  /**
   * 生成月度趋势图
   */
  private async generateMonthlyTrendChart(year: string, month: string, rawData: Record<string, any[]>): Promise<Buffer> {
    const canvas = createCanvas(800, 400);
    const chart = echarts.init(canvas);

    const tempData = rawData.tbdatatable?.map((row) => parseFloat(row.col5 || 0)) || [];
    const rainData = rawData.r61datatable?.map((row) => parseFloat(row.htotal || 0)) || [];
    const days = tempData.length > 0 ? Array.from({ length: tempData.length }, (_, i) => `${i + 1}日`) : [];

    const option = {
      title: { text: `${year}年${month}月气象数据趋势` },
      tooltip: { trigger: "axis" },
      legend: { data: ["平均气温", "日降水量"] },
      xAxis: { type: "category", data: days },
      yAxis: [
        { type: "value", name: "气温(℃)" },
        { type: "value", name: "降水量(mm)", axisLabel: { formatter: "{value}mm" } },
      ],
      series: [
        { name: "平均气温", type: "line", data: tempData, yAxisIndex: 0 },
        { name: "日降水量", type: "bar", data: rainData, yAxisIndex: 1 },
      ],
    };

    chart.setOption(option);
    const buffer = canvas.toBuffer("image/png");
    chart.dispose();
    return buffer;
  }

  /**
   * 生成风向玫瑰图
   */
  private async generateWindRoseChart(windData: Record<string, any>): Promise<Buffer> {
    const canvas = createCanvas(600, 600);
    const chart = echarts.init(canvas);

    const directions = Object.keys(windData.windDirectionCount);
    const counts = Object.values(windData.windDirectionCount);

    const option = {
      title: { text: "风向玫瑰图", left: "center" },
      tooltip: { trigger: "item" },
      polar: { radius: ["10%", "80%"] },
      angleAxis: { type: "category", data: directions },
      radiusAxis: { type: "value" },
      series: [
        {
          type: "bar",
          data: counts,
          coordinateSystem: "polar",
          name: "出现次数",
          emphasis: { focus: "series" },
        },
      ],
    };

    chart.setOption(option);
    const buffer = canvas.toBuffer("image/png");
    chart.dispose();
    return buffer;
  }

  // ==================== HTML表格生成 ====================
  private generateStatisticsTable(data: Record<string, any>): string {
    let html = `<table border="1" cellpadding="8" cellspacing="0" style="width:100%;border-collapse:collapse;">
      <tr><th colspan="4">月度气象统计总表</th></tr>
      <tr><th>指标</th><th>平均值</th><th>最大值</th><th>最小值</th></tr>`;

    if (data.temperature) {
      html += `<tr><td>气温(℃)</td><td>${data.temperature.avg}</td><td>${data.temperature.max}</td><td>${data.temperature.min}</td></tr>`;
    }
    if (data.pressure) {
      html += `<tr><td>气压(hPa)</td><td>${data.pressure.avg}</td><td>${data.pressure.max}</td><td>${data.pressure.min}</td></tr>`;
    }
    if (data.humidity) {
      html += `<tr><td>相对湿度(%)</td><td>${data.humidity.avg}</td><td>${data.humidity.max}</td><td>${data.humidity.min}</td></tr>`;
    }
    if (data.precipitation) {
      html += `</table><br><table border="1" cellpadding="8" cellspacing="0" style="width:100%;border-collapse:collapse;">
        <tr><th colspan="4">降水量统计</th></tr>
        <tr><td>月总降水量(mm)</td><td>${data.precipitation.total}</td>
        <td>最大日降水量(mm)</td><td>${data.precipitation.maxDaily}</td></tr>
        <tr><td>降雨日数</td><td>${data.precipitation.rainDays}</td>
        <td>暴雨日数</td><td>${data.precipitation.rainstormDays}</td></tr>`;
    }

    html += `</table>`;
    return html;
  }

  private generateWindTable(data: Record<string, any>): string {
    let html = `<table border="1" cellpadding="8" cellspacing="0" style="width:100%;border-collapse:collapse;">
      <tr><th colspan="4">风数据统计总表</th></tr>
      <tr><td>月最大风速(m/s)</td><td>${data.maxWindSpeed}</td>
      <td>大风日数(≥10.8m/s)</td><td>${data.windyDays}</td></tr>
      </table><br>
      <table border="1" cellpadding="8" cellspacing="0" style="width:100%;border-collapse:collapse;">
      <tr><th>风向</th><th>出现次数</th><th>平均风速(m/s)</th></tr>`;

    for (const [direction, count] of Object.entries(data.windDirectionCount)) {
      html += `<tr><td>${direction}</td><td>${count}</td><td>${data.windSpeedAvg[direction]}</td></tr>`;
    }

    html += `</table>`;
    return html;
  }
