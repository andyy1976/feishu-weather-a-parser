    postData += `Content-Disposition: form-data; name="image_type"\r\n\r\nmessage\r\n`;
    postData += `--${boundary}\r\n`;
    postData += `Content-Disposition: form-data; name="image"; filename="chart.png"\r\n`;
    postData += `Content-Type: image/png\r\n\r\n`;

    const endData = `\r\n--${boundary}--\r\n`;
    const fullBuffer = Buffer.concat([Buffer.from(postData, "utf-8"), imageBuffer, Buffer.from(endData, "utf-8")]);

    return new Promise((resolve, reject) => {
