typescript
运行
import { ProcessTask, TaskStatus } from "./types";
import Database from "better-sqlite3";
import { FeishuBot } from "./feishu-bot";

/**
 * 任务调度核心类
 * 实现异步任务队列、指数退避重试、状态管理、失败告警
 */
export class TaskScheduler {
  private readonly db: Database.Database;
  private readonly feishuBot: FeishuBot;
  private readonly maxConcurrent: number;
  private taskQueue: ProcessTask[] = [];
  private runningTasks: number = 0;
  private isRunning: boolean = false;

  constructor(dbPath: string, feishuBot: FeishuBot, maxConcurrent: number = 5) {
    this.db = new Database(dbPath);
    this.feishuBot = feishuBot;
    this.maxConcurrent = maxConcurrent;
    this.initTables();
  }

  /**
   * 初始化任务表
   */
  private initTables() {
    this.db.exec(`
      CREATE TABLE IF NOT EXISTS process_task (
        task_id TEXT PRIMARY KEY,
        user_id TEXT NOT NULL,
        region_id TEXT NOT NULL,
        file_path TEXT NOT NULL,
        file_name TEXT NOT NULL,
        station_num TEXT,
        month_year TEXT,
        task_type TEXT NOT NULL,
        status TEXT NOT NULL,
        created_at TEXT NOT NULL,
        updated_at TEXT NOT NULL,
        retry_count INTEGER DEFAULT 0,
        max_retry INTEGER DEFAULT 3,
        error_msg TEXT,
        result TEXT,
        UNIQUE(task_id)
      );
      CREATE INDEX IF NOT EXISTS idx_status ON process_task(status);
      CREATE INDEX IF NOT EXISTS idx_user ON process_task(user_id);
    `);
  }

  /**
   * 创建任务
   */
  public createTask(task: Omit<ProcessTask, "task_id" | "created_at" | "updated_at" | "retry_count" | "status">): string {
    const taskId = `task_${Date.now()}_${Math.random().toString(36).substring(2, 9)}`;
    const now = new Date().toISOString();

    this.db.prepare(`
      INSERT INTO process_task 
      (task_id, user_id, region_id, file_path, file_name, station_num, month_year, task_type, status, created_at, updated_at, max_retry)
      VALUES (?, ?, ?, ?, ?, ?, ?, ?, 'pending', ?, ?, ?)
    `).run(
      taskId,
      task.user_id,
      task.region_id,
      task.file_path,
      task.file_name,
      task.station_num || "",
      task.month_year || "",
      task.task_type,
      now,
      now,
      task.max_retry || 3
    );

    // 加入队列
    this.taskQueue.push({
      ...task,
      task_id: taskId,
      status: "pending",
      created_at: now,
      updated_at: now,
      retry_count: 0,
    });

    // 启动调度器
    this.start();

    return taskId;
  }

  /**
   * 启动任务调度器
   */
  public start() {
    if (this.isRunning) return;
    this.isRunning = true;
    this.runLoop();
    console.log("任务调度器已启动");
  }

  /**
   * 停止任务调度器
   */
  public stop() {
    this.isRunning = false;
    console.log("任务调度器已停止");
  }

  /**
   * 任务执行循环
   */
  private async runLoop() {
    while (this.isRunning) {
      // 并发控制
      if (this.runningTasks >= this.maxConcurrent) {
        await this.sleep(100);
        continue;
      }

      // 取出队列头部任务
      const task = this.taskQueue.shift();
      if (!task) {
        await this.sleep(100);
        continue;
      }

      // 执行任务
      this.runningTasks++;
      this.executeTask(task).finally(() => {
        this.runningTasks--;
      });
    }
  }

  /**
   * 执行单个任务
   */
  private async executeTask(task: ProcessTask) {
    try {
      // 更新任务状态为处理中
      this.updateTaskStatus(task.task_id, "processing");
      await this.feishuBot.sendTextMessage(task.user_id, `🔄 任务【${task.file_name}】开始处理，任务ID：${task.task_id}`);

      // 任务执行逻辑（根据任务类型分发）
      let result: any = {};
      switch (task.task_type) {
        case "convert_only":
          // 仅转换Excel，调用解析器
          result = await this.handleConvertOnly(task);
          break;
        case "convert_save":
          // 转换+存储
          result = await this.handleConvertAndSave(task);
          break;
        case "analysis_report":
          // 统计分析+生成报告
          result = await this.handleAnalysisReport(task);
          break;
        case "remote_process":
          // 远程处理
          result = await this.handleRemoteProcess(task);
          break;
      }

      // 任务成功
      this.updateTaskStatus(task.task_id, "success", JSON.stringify(result));
      await this.feishuBot.sendTextMessage(task.user_id, `✅ 任务【${task.file_name}】处理完成！${result.message || ""}`);
    } catch (err) {
      const errorMsg = (err as Error).message;
      console.error(`任务${task.task_id}执行失败：`, errorMsg);

      // 重试逻辑（指数退避）
      if (task.retry_count < task.max_retry) {
        const newRetryCount = task.retry_count + 1;
        this.db.prepare(`
          UPDATE process_task SET retry_count = ?, status = 'retrying', updated_at = ?, error_msg = ?
          WHERE task_id = ?
        `).run(newRetryCount, new Date().toISOString(), errorMsg, task.task_id);

        // 指数退避延迟后重新入队
        const delay = Math.pow(2, newRetryCount) * 1000;
        await this.sleep(delay);
        task.retry_count = newRetryCount;
        this.taskQueue.push(task);
        await this.feishuBot.sendTextMessage(task.user_id, `⚠️ 任务【${task.file_name}】执行失败，${delay/1000}秒后进行第${newRetryCount}次重试，失败原因：${errorMsg}`);
      } else {
        // 重试次数耗尽，标记失败
        this.updateTaskStatus(task.task_id, "failed", undefined, errorMsg);
        await this.feishuBot.sendTextMessage(task.user_id, `❌ 任务【${task.file_name}】处理失败，已达到最大重试次数，失败原因：${errorMsg}`);
        // 发送告警
        this.sendAlert(task, errorMsg);
      }
    }
  }

  // ==================== 任务处理逻辑 ====================
  private async handleConvertOnly(task: ProcessTask) {
    // 调用解析器转换Excel
    const parser = new AQFileParser();
    const result = await parser.parseFile(task.file_path);
    if (!result.success) throw new Error(result.message);

    // 发送Excel文件给用户
    await this.feishuBot.sendFileMessage(task.user_id, result.result!.excel_path!, task.file_name.replace(".txt", ".xlsx"));
    parser.close();

    return {
      message: "Excel文件已发送给您",
      excel_path: result.result!.excel_path,
    };
  }

  private async handleConvertAndSave(task: ProcessTask) {
    // 转换+多端存储实现
    return { message: "转换并存储完成" };
  }

  private async handleAnalysisReport(task: ProcessTask) {
    // 统计分析+生成飞书报告实现
    return { message: "分析报告已生成" };
  }

  private async handleRemoteProcess(task: ProcessTask) {
    // 远程处理实现
    return { message: "远程处理完成" };
  }

  // ==================== 工具方法 ====================
  private updateTaskStatus(taskId: string, status: TaskStatus, result?: string, errorMsg?: string) {
    this.db.prepare(`
      UPDATE process_task SET status = ?, updated_at = ?, result = ?, error_msg = ?
      WHERE task_id = ?
    `).run(status, new Date().toISOString(), result || null, errorMsg || null, taskId);
  }

  private async sendAlert(task: ProcessTask, errorMsg: string) {
    // 发送告警到飞书告警群
    const alertContent = `【任务失败告警】
任务ID：${task.task_id}
用户ID：${task.user_id}
任务类型：${task.task_type}
文件名：${task.file_name}
失败原因：${errorMsg}
失败时间：${new Date().toLocaleString("zh-CN")}`;

    try {
      await this.feishuBot.sendTextMessage(process.env.ALERT_CHAT_ID!, alertContent);
    } catch (err) {
      console.error("发送告警失败：", err);
    }
  }

  private sleep(ms: number): Promise<void> {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  /**
   * 关闭数据库连接
   */
  public close() {
    this.stop();
    this.db.close();
  }
}
