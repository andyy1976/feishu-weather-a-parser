import * as https from "https";
import * as fs from "fs/promises";
import { createWriteStream, existsSync } from "fs";
import * as path from "path";
import { FeishuMessageEvent, FeishuCardAction, FeishuUserInfo } from "./types";
import { AQFileParser } from "./aq-file-parser";
import { RegionManager } from "./region-manager";
import * as dotenv from "dotenv";

dotenv.config();

/**
 * 飞书机器人核心类
 * 对接飞书开放平台API，处理用户交互、文件接收、指令执行、结果推送
 */
export class FeishuBot {
  private readonly appId: string;
  private readonly appSecret: string;
  private readonly encryptKey?: string;
  private readonly verificationToken: string;
  private tenantAccessToken: string = "";
  private tokenExpireTime: number = 0;
  private readonly tempDir: string;
  private readonly parser: AQFileParser;
  private readonly regionManager: RegionManager;

  constructor(options: {
    appId: string;
    appSecret: string;
    verificationToken: string;
    encryptKey?: string;
    tempDir?: string;
    parser: AQFileParser;
    regionManager: RegionManager;
  }) {
    this.appId = options.appId;
    this.appSecret = options.appSecret;
    this.verificationToken = options.verificationToken;
    this.encryptKey = options.encryptKey;
    this.tempDir = options.tempDir || path.resolve(process.cwd(), "temp");
    this.parser = options.parser;
    this.regionManager = options.regionManager;

    // 初始化临时目录
    if (!existsSync(this.tempDir)) {
      fs.mkdir(this.tempDir, { recursive: true });
    }
  }

  // ==================== 鉴权核心方法 ====================
  /**
   * 获取租户访问凭证（自动缓存，过期自动刷新）
   */
  public async getTenantAccessToken(): Promise<string> {
    const now = Date.now();
    if (this.tenantAccessToken && this.tokenExpireTime > now) {
      return this.tenantAccessToken;
    }

    return new Promise((resolve, reject) => {
      const postData = JSON.stringify({
        app_id: this.appId,
        app_secret: this.appSecret,
      });

      const options = {
        hostname: "open.feishu.cn",
        port: 443,
        path: "/open-apis/auth/v3/tenant_access_token/internal",
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Content-Length": Buffer.byteLength(postData),
        },
      };

      const req = https.request(options, (res) => {
        let data = "";
        res.on("data", (chunk) => {
          data += chunk;
        });
        res.on("end", () => {
          const result = JSON.parse(data);
          if (result.code !== 0) {
            reject(new Error(`获取飞书凭证失败：${result.msg}`));
            return;
          }
          this.tenantAccessToken = result.tenant_access_token;
          this.tokenExpireTime = now + (result.expire - 60) * 1000; // 提前1分钟过期
          resolve(this.tenantAccessToken);
        });
      });

      req.on("error", (err) => {
        reject(err);
      });

      req.write(postData);
      req.end();
    });
  }

  // ==================== 消息处理核心方法 ====================
  /**
   * 解析飞书消息事件
   */
  public async parseMessageEvent(event: any): Promise<FeishuMessageEvent | null> {
    // 校验验证令牌
    if (event.token !== this.verificationToken) {
      console.warn("飞书消息令牌校验失败");
      return null;
    }

    // 处理URL校验
    if (event.type === "url_verification") {
      return null;
    }

    // 处理消息事件
    if (event.event?.message) {
      const message = event.event.message;
      const sender = event.event.sender;
      const content = JSON.parse(message.content);

      return {
        message_id: message.message_id,
        chat_id: message.chat_id,
        chat_type: message.chat_type,
        sender: {
          open_id: sender.sender_id.open_id,
          user_id: sender.sender_id.user_id,
          name: sender.sender.name,
          department_ids: sender.department_ids || [],
        },
        message_type: message.message_type,
        content: content.text || "",
        file_key: message.message_type === "file" ? content.file_key : undefined,
        file_name: message.message_type === "file" ? content.file_name : undefined,
      };
    }

    return null;
  }

  /**
   * 解析飞书卡片交互事件
   */
  public async parseCardAction(event: any): Promise<FeishuCardAction | null> {
    if (event.token !== this.verificationToken) {
      console.warn("飞书卡片令牌校验失败");
      return null;
    }

    if (event.action) {
      return {
        action_id: event.action.action_id,
        user: {
          open_id: event.open_id,
          user_id: event.user_id,
          name: event.user_name,
          department_ids: [],
        },
        message_id: event.message_id,
        form_value: event.action.form_value || {},
      };
    }

    return null;
  }

  /**
   * 下载飞书用户上传的文件
   */
  public async downloadFile(fileKey: string, fileName: string): Promise<string> {
    const token = await this.getTenantAccessToken();
    const savePath = path.resolve(this.tempDir, `${Date.now()}_${fileName}`);

    return new Promise((resolve, reject) => {
      const options = {
        hostname: "open.feishu.cn",
        port: 443,
        path: `/open-apis/drive/v1/files/${fileKey}/download`,
        method: "GET",
        headers: {
          Authorization: `Bearer ${token}`,
        },
      };

      const req = https.request(options, (res) => {
        if (res.statusCode !== 200) {
          reject(new Error(`下载文件失败，状态码：${res.statusCode}`));
          return;
        }

        const writeStream = createWriteStream(savePath);
        res.pipe(writeStream);

        writeStream.on("finish", () => {
          writeStream.close();
          resolve(savePath);
        });

        writeStream.on("error", (err) => {
          reject(err);
        });
      });

      req.on("error", (err) => {
        reject(err);
      });

      req.end();
    });
  }

  /**
   * 发送文本消息
   */
  public async sendTextMessage(chatId: string, content: string): Promise<void> {
    const token = await this.getTenantAccessToken();
    const postData = JSON.stringify({
      receive_id: chatId,
      content: JSON.stringify({ text: content }),
      msg_type: "text",
    });

    return new Promise((resolve, reject) => {
      const options = {
        hostname: "open.feishu.cn",
        port: 443,
        path: "/open-apis/im/v1/messages?receive_id_type=chat_id",
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          "Content-Length": Buffer.byteLength(postData),
        },
      };

      const req = https.request(options, (res) => {
        let data = "";
        res.on("data", (chunk) => {
          data += chunk;
        });
        res.on("end", () => {
          const result = JSON.parse(data);
          if (result.code !== 0) {
            reject(new Error(`发送消息失败：${result.msg}`));
            return;
          }
          resolve();
        });
      });

      req.on("error", (err) => {
        reject(err);
      });

      req.write(postData);
      req.end();
    });
  }

  /**
   * 发送操作选择交互卡片
   */
  public async sendOperationCard(chatId: string, messageId: string, filePath: string, fileName: string): Promise<void> {
    const token = await this.getTenantAccessToken();
    const card = {
      config: { wide_screen_mode: true },
      elements: [
        {
          tag: "div",
          text: { content: `📁 已收到您的A文件：**${fileName}**，请选择要执行的操作：`, tag: "lark_md" },
        },
        {
          tag: "action",
          actions: [
            {
              tag: "button",
              text: { content: "仅转换Excel", tag: "plain_text" },
              type: "primary",
              action_id: "convert_only",
              value: { file_path: filePath, file_name: fileName },
            },
            {
              tag: "button",
              text: { content: "转换+存储", tag: "plain_text" },
              type: "default",
              action_id: "convert_save",
              value: { file_path: filePath, file_name: fileName },
            },
            {
              tag: "button",
              text: { content: "统计分析+生成报告", tag: "plain_text" },
              type: "default",
              action_id: "analysis_report",
              value: { file_path: filePath, file_name: fileName },
