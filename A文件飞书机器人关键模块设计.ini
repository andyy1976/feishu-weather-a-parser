import { RegionInfo, RegionLevel, UserRegionPermission, FeishuUserInfo } from "./types";
import Database from "better-sqlite3";
import * as fs from "fs/promises";
import { existsSync } from "fs";
import * as path from "path";

/**
 * 区域化权限管理核心类
 * 实现省/市/县/乡镇四级区域管理、用户权限绑定、数据隔离过滤
 */
export class RegionManager {
  private readonly db: Database.Database;
  private readonly regionDataPath: string;

  constructor(dbPath: string, regionDataPath?: string) {
    // 初始化数据库
    this.db = new Database(dbPath);
    this.regionDataPath = regionDataPath || path.resolve(process.cwd(), "config/region.json");
    this.initTables();
  }

  /**
   * 初始化区域表、用户权限表
   */
  private initTables() {
    // 区域信息表
    this.db.exec(`
      CREATE TABLE IF NOT EXISTS region_info (
        region_id TEXT PRIMARY KEY,
        name TEXT NOT NULL,
        parent_id TEXT NOT NULL,
        level INTEGER NOT NULL,
        full_path TEXT NOT NULL,
        created_at TEXT NOT NULL,
        updated_at TEXT NOT NULL,
        UNIQUE(region_id)
      );
    `);

    // 用户区域权限表
    this.db.exec(`
      CREATE TABLE IF NOT EXISTS user_region_permission (
        user_id TEXT PRIMARY KEY,
        open_id TEXT NOT NULL,
        region_id TEXT NOT NULL,
        can_access_child_region INTEGER DEFAULT 0,
        created_at TEXT NOT NULL,
        updated_at TEXT NOT NULL,
        FOREIGN KEY (region_id) REFERENCES region_info(region_id),
        UNIQUE(user_id, open_id)
      );
    `);
  }

  /**
   * 初始化全国区域数据（从JSON配置文件加载）
   */
  public async initRegionData() {
    if (!existsSync(this.regionDataPath)) {
      await fs.mkdir(path.dirname(this.regionDataPath), { recursive: true });
      await fs.writeFile(this.regionDataPath, JSON.stringify([], null, 2), "utf-8");
      console.warn("区域配置文件不存在，已创建空文件，请补充区域数据");
      return;
    }

    const regionData: RegionInfo[] = JSON.parse(await fs.readFile(this.regionDataPath, "utf-8"));
    if (regionData.length === 0) return;

    // 批量写入数据库
    const insertStmt = this.db.prepare(`
      INSERT OR REPLACE INTO region_info 
      (region_id, name, parent_id, level, full_path, created_at, updated_at)
      VALUES (@region_id, @name, @parent_id, @level, @full_path, @created_at, @updated_at)
    `);

    const tx = this.db.transaction(() => {
      for (const region of regionData) {
        insertStmt.run({
          ...region,
          created_at: new Date().toISOString(),
          updated_at: new Date().toISOString(),
        });
      }
    });
    tx();
    console.log(`区域数据初始化完成，共加载 ${regionData.length} 条区域记录`);
  }

  /**
   * 根据飞书部门路径自动绑定用户区域
   * @param user 飞书用户信息
   * @param departmentFullPath 飞书部门完整路径（例：XX公司/河北省/石家庄市/正定县/XX乡镇气象站）
   */
  public async bindUserRegionByDepartment(user: FeishuUserInfo, departmentFullPath: string): Promise<UserRegionPermission> {
    // 从部门路径中匹配区域层级
    const allRegions = this.db.prepare("SELECT * FROM region_info ORDER BY level DESC").all() as RegionInfo[];
    let matchedRegion: RegionInfo | null = null;

    // 从最细粒度（乡镇）开始匹配
    for (const region of allRegions) {
      if (departmentFullPath.includes(region.name)) {
        matchedRegion = region;
        break;
      }
    }

    if (!matchedRegion) {
      throw new Error(`未匹配到用户所属区域，部门路径：${departmentFullPath}`);
    }

    // 绑定用户权限
    const now = new Date().toISOString();
    this.db.prepare(`
      INSERT OR REPLACE INTO user_region_permission
      (user_id, open_id, region_id, can_access_child_region, created_at, updated_at)
      VALUES (?, ?, ?, 1, ?, ?)
    `).run(user.user_id, user.open_id, matchedRegion.region_id, now, now);

    return {
      user_id: user.user_id,
      region_id: matchedRegion.region_id,
      region_info: matchedRegion,
      can_access_child_region: true,
    };
  }

  /**
   * 获取用户区域权限
   */
  public getUserPermission(userId: string): UserRegionPermission | null {
    const result = this.db.prepare(`
      SELECT urp.*, ri.name, ri.parent_id, ri.level, ri.full_path
      FROM user_region_permission urp
      LEFT JOIN region_info ri ON urp.region_id = ri.region_id
      WHERE urp.user_id = ?
    `).get(userId) as any;

    if (!result) return null;

    return {
      user_id: result.user_id,
      region_id: result.region_id,
      can_access_child_region: result.can_access_child_region === 1,
      region_info: {
        region_id: result.region_id,
        name: result.name,
        parent_id: result.parent_id,
        level: result.level,
        full_path: result.full_path,
      },
    };
  }

  /**
   * 获取用户可访问的所有区域ID列表（用于数据隔离过滤）
   */
  public getUserAccessibleRegionIds(userId: string): string[] {
    const permission = this.getUserPermission(userId);
    if (!permission) return [];

    const { region_id, can_access_child_region, region_info } = permission;
    const accessibleIds = [region_id];

    // 若允许访问子区域，递归获取所有子区域
    if (can_access_child_region) {
      const getChildRegions = (parentId: string) => {
        const children = this.db.prepare("SELECT region_id FROM region_info WHERE parent_id = ?").all(parentId) as { region_id: string }[];
        for (const child of children) {
          accessibleIds.push(child.region_id);
          getChildRegions(child.region_id);
        }
      };
      getChildRegions(region_id);
    }

    return accessibleIds;
  }

  /**
   * 获取区域完整路径（用于文件/文档归档）
   */
  public getRegionFullPath(regionId: string): string {
    const region = this.db.prepare("SELECT full_path FROM region_info WHERE region_id = ?").get(regionId) as { full_path: string } | undefined;
    return region?.full_path || "未知区域";
  }

  /**
   * 关闭数据库连接
   */
  public close() {
    this.db.close();
  }
}
