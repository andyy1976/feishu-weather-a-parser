四、本地部署使用步骤（5 步开箱即用）
环境准备：安装 Node.js 16+ 版本（官网下载：https://nodejs.org/，安装后执行 node -v 验证成功）
下载代码：创建项目文件夹，将上述所有文件按结构放入文件夹中
安装依赖：在项目文件夹中打开终端，执行 npm install
配置文件：修改 .env 中的 FILE_PATH 为你要解析的 A/Q 文件本地路径
运行解析：
开发模式直接运行：npm run dev
编译后运行：npm run build && npm run start
运行完成后，会在 output 目录生成解析后的 Excel 文件，若开启了数据库配置，会同时写入 SQLite 数据库，可直接用数据库工具打开查看。
五、飞书机器人技能集成方式
该解析器可直接封装为 OpenClaw 技能，无缝接入飞书天气机器人体系，核心集成逻辑：
接收飞书文件：飞书机器人接收用户上传的 A 文件，通过飞书文件 API 下载到本地临时目录
调用解析器：初始化 AQFileParser，传入临时文件路径执行解析
结果回传：
将生成的 Excel 文件通过飞书文件 API 上传，返回给用户
解析后的结构化数据，调用飞书文档 API 生成统计报告
通过飞书消息 API 推送解析结果通知
区域化适配：通过飞书用户组织架构获取用户所属区域，将解析数据按区域隔离存储，完全对齐原方案的区域化管理要求
六、扩展说明
命令行扩展：可基于 commander 库扩展命令行工具，支持批量解析文件夹、指定导出格式等功能
统计分析扩展：可集成 echarts 等图表库，生成风向玫瑰图、月度统计图表，对齐原方案的统计分析需求
云存储扩展：可集成百度网盘 API、ARAS 服务器 API，将解析后的文件自动上传到对应存储
飞书深度集成：可直接对接飞书表格 API，将解析数据直接写入飞书多维表格，无需本地 Excel 导出
远程处理适配：可封装为 HTTP 接口，部署到远程服务器，实现原方案的远程处理能力